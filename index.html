<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>观小远赛龙舟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        
        #startOverlay h1 {
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        #startOverlay .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        #startOverlay p {
            font-size: 1em;
            margin: 10px 0;
            text-align: center;
            padding: 0 20px;
        }
        
        #startOverlay .hint {
            font-size: 0.85em;
            color: #aaa;
            margin-top: 30px;
        }
        
        #startOverlay .company-logo {
            font-size: 1.2em;
            color: #00CED1;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        #startOverlay .subtitle {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 15px;
        }
        
        #gameOverOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        
        #gameOverOverlay h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        #gameOverOverlay .score {
            font-size: 1.5em;
            color: #FFD700;
            margin-bottom: 10px;
        }
        
        #gameOverOverlay .highScore {
            font-size: 1em;
            color: #aaa;
            margin-bottom: 30px;
        }
        
        #gameOverOverlay .restartBtn {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #gameOverOverlay .restartBtn:hover {
            transform: scale(1.05);
        }
        
        #gameOverOverlay .company-logo {
            font-size: 1.1em;
            color: #00CED1;
            font-weight: bold;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        #gameOverOverlay .footer {
            font-size: 0.85em;
            color: #888;
            margin-top: 20px;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 1.1em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 5;
            pointer-events: none;
        }
        
        #ui .score {
            font-weight: bold;
            font-size: 1.3em;
        }
        
        #ui .difficulty {
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div class="score">得分: <span id="scoreValue">0</span></div>
            <div>时间: <span id="timeValue">0</span>s</div>
            <div class="difficulty">难度: <span id="difficultyValue">简单</span></div>
        </div>
        
        <div id="startOverlay">
            <div class="company-logo">观远数据</div>
            <div class="emoji">🐲</div>
            <h1>观小远赛龙舟</h1>
            <p class="subtitle">端午AI创作活动作品</p>
            <p>点击屏幕控制龙舟上下移动</p>
            <p>躲避障碍物，收集粽子和道具！</p>
            <p class="hint">🎁 粽子+10分 | 📊 数据图表+50分 | 🧧 香囊=护盾</p>
            <p class="hint">点击任意处开始游戏</p>
        </div>
        
        <div id="gameOverOverlay">
            <div class="company-logo">观远数据</div>
            <h2>游戏结束</h2>
            <div class="score">最终得分: <span id="finalScore">0</span></div>
            <div class="highScore">最高分: <span id="highScoreValue">0</span></div>
            <button class="restartBtn" onclick="game.restart()">再来一局</button>
            <p class="footer">观小远祝您端午安康 🎋</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
